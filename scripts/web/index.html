<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>QTE Macro</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="/eel.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  body{background:#030712;font-family:'Inter',sans-serif}
  .glass{background:rgba(12,18,34,0.85);backdrop-filter:blur(16px);border:1px solid rgba(56,189,248,0.08)}
  ::-webkit-scrollbar{width:3px} ::-webkit-scrollbar-thumb{background:rgba(56,189,248,0.15);border-radius:3px}
  input[type=range]{-webkit-appearance:none;height:4px;border-radius:2px;background:#182444}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#22d3ee;cursor:pointer}
  @keyframes pop{0%{transform:scale(.7);opacity:0}100%{transform:scale(1);opacity:1}} .pop{animation:pop .15s ease}
  @keyframes dp{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.4)}50%{box-shadow:0 0 0 6px rgba(16,185,129,0)}} .dp{animation:dp 1.5s ease infinite}
</style>
</head>
<body class="text-slate-200 min-h-screen">
<div class="max-w-[480px] mx-auto px-4 py-5 space-y-3">

  <!-- Header -->
  <div class="flex items-end justify-between">
    <div><h1 class="text-lg font-extrabold text-white">QTE Macro</h1>
      <p class="text-[10px] text-slate-600">เห็นตัวอักษร → กดเลย</p></div>
    <div class="flex items-center gap-2">
      <div id="badge" class="flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-bold border border-slate-700/50 text-slate-500">
        <span id="dot" class="w-1.5 h-1.5 rounded-full bg-slate-600"></span><span id="stxt">OFF</span></div>
      <span id="timer" class="font-mono text-xs text-slate-600">00:00</span>
    </div>
  </div>
  <div class="h-px bg-gradient-to-r from-transparent via-cyan-500/20 to-transparent"></div>

  <!-- START -->
  <button id="btn" onclick="go()" class="w-full py-3 rounded-xl font-bold text-base bg-gradient-to-r from-emerald-600 to-teal-500 text-white hover:shadow-[0_0_20px_rgba(16,185,129,.2)] active:scale-[.98] transition-all">
    <span id="btxt">START</span></button>

  <!-- Stats -->
  <div class="glass rounded-xl overflow-hidden">
    <div id="preview" class="w-full h-14 bg-[#030712] flex items-center justify-center border-b border-white/5">
      <span id="prPH" class="text-[10px] text-slate-700">กด F6 เลือก region ก่อน</span>
      <img id="prImg" class="hidden w-full h-full object-contain" src="">
    </div>
    <!-- Debug slot bar -->
    <div id="dbg" class="flex gap-1 px-3 py-1.5"></div>
    <!-- Stats -->
    <div class="px-4 py-3 flex items-center gap-4">
      <div><div id="cnt" class="font-mono text-3xl font-black text-emerald-400">0</div>
        <div class="text-[8px] text-slate-600 font-bold tracking-widest">KEYS</div></div>
      <div class="w-px h-8 bg-white/5"></div>
      <div class="flex-1"><div id="spd" class="font-mono text-xs text-slate-500">—</div></div>
    </div>
    <!-- Learned keys -->
    <div id="lbar" class="px-4 pb-2 hidden">
      <div class="text-[8px] text-slate-600 font-bold tracking-wider mb-1">LEARNED</div>
      <div id="lkeys" class="flex gap-1 flex-wrap"></div>
    </div>
    <!-- History -->
    <div id="hist" class="px-4 pb-3 flex flex-wrap gap-1 min-h-[20px]"></div>
  </div>

  <!-- Region -->
  <div>
    <div class="text-[9px] font-bold text-slate-600 tracking-wider mb-1">REGION</div>
    <div class="glass rounded-xl px-3 py-2 flex items-center gap-2">
      <button onclick="eel.select_region()" class="px-3 py-1.5 rounded-lg bg-cyan-500/10 border border-cyan-500/20 text-cyan-300 text-xs font-bold hover:bg-cyan-500/15 active:scale-95 transition-all">Select (F6)</button>
      <button onclick="doTest()" class="px-2.5 py-1.5 rounded-lg bg-orange-500/10 border border-orange-500/20 text-orange-300 text-xs font-bold hover:bg-orange-500/15 active:scale-95 transition-all">Test</button>
      <div class="flex-1"></div>
      <span id="rinfo" class="font-mono text-[10px] text-amber-400/70">not set</span>
    </div>
  </div>

  <!-- Settings -->
  <div>
    <div class="text-[9px] font-bold text-slate-600 tracking-wider mb-1">SETTINGS</div>
    <div class="glass rounded-xl px-3 py-2.5 space-y-2">
      <div class="flex items-center"><span class="text-xs text-slate-400 w-24">Keys/Lane</span>
        <input type="range" id="sN" min="2" max="10" value="5" class="flex-1" oninput="U(this,'vN')">
        <span id="vN" class="font-mono text-xs text-cyan-300 font-bold w-6 text-right">5</span></div>
      <div class="flex items-center"><span class="text-xs text-slate-400 w-24">Scan</span>
        <input type="range" id="sS" min="20" max="100" value="30" class="flex-1" oninput="U(this,'vS','ms')">
        <span id="vS" class="font-mono text-xs text-emerald-400 font-bold w-10 text-right">30ms</span></div>
      <div class="flex items-center"><span class="text-xs text-slate-400 w-24">Key Delay</span>
        <input type="range" id="sK" min="20" max="200" value="50" class="flex-1" oninput="U(this,'vK','ms')">
        <span id="vK" class="font-mono text-xs text-violet-400 font-bold w-10 text-right">50ms</span></div>
      <div class="flex items-center"><span class="text-xs text-slate-400 w-24">Round Delay</span>
        <input type="range" id="sL" min="200" max="1500" value="500" step="50" class="flex-1" oninput="U(this,'vL','ms')">
        <span id="vL" class="font-mono text-xs text-orange-400 font-bold w-10 text-right">500ms</span></div>
    </div>
  </div>

  <!-- Log -->
  <div>
    <div class="flex items-center mb-1"><span class="text-[9px] font-bold text-slate-600 tracking-wider">LOG</span>
      <div class="flex-1 h-px bg-white/5 ml-2"></div>
      <button onclick="L().innerHTML=''" class="text-[9px] text-slate-700 hover:text-slate-400 ml-2">clear</button></div>
    <div id="log" class="glass rounded-xl px-3 py-2 h-28 overflow-y-auto font-mono text-[10px] space-y-px">
      <div class="text-slate-700">Ready</div></div>
  </div>

  <div class="text-center text-[8px] text-slate-800 tracking-widest">F5 Start · F6 Region · ESC Stop</div>
</div>

<script>
const $=id=>document.getElementById(id), L=()=>$('log');
let on=false, hist=[];

eel.expose(onKeyPressed);
function onKeyPressed(k,c,s){
  $('cnt').textContent=c; $('spd').textContent=s.toFixed(1)+' keys/sec';
  hist.push(k.toUpperCase()); if(hist.length>16)hist.shift();
  $('hist').innerHTML=hist.map(k=>`<span class="pop inline-flex items-center justify-center w-5 h-5 rounded bg-cyan-500/10 border border-cyan-500/15 text-cyan-300 font-mono text-[9px] font-bold">${k}</span>`).join('');
}

eel.expose(onLog);
function onLog(m,t){
  const d=document.createElement('div'),tm=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const c={ok:'text-emerald-400',err:'text-rose-400',warn:'text-amber-400',key:'text-cyan-400 font-semibold',dim:'text-slate-600'}[t]||'text-slate-400';
  d.innerHTML=`<span class="text-slate-700">${tm}</span> <span class="${c}">${m}</span>`;
  L().appendChild(d); L().scrollTop=L().scrollHeight;
  while(L().children.length>60)L().removeChild(L().firstChild);
}

eel.expose(onRegionSet); function onRegionSet(i){$('rinfo').textContent=i;$('rinfo').className='font-mono text-[10px] text-emerald-400'}
eel.expose(onPreview); function onPreview(b){$('prImg').src='data:image/jpeg;base64,'+b;$('prImg').classList.remove('hidden');$('prPH').classList.add('hidden')}
eel.expose(onTimerUpdate); function onTimerUpdate(t){$('timer').textContent=t}

eel.expose(onStatus);
function onStatus(r){
  on=r;
  $('btxt').textContent=r?'STOP':'START';
  $('btn').className=$('btn').className.replace(r?'from-emerald-600 to-teal-500':'from-rose-600 to-red-500',r?'from-rose-600 to-red-500':'from-emerald-600 to-teal-500');
  $('dot').className='w-1.5 h-1.5 rounded-full '+(r?'bg-emerald-400 dp':'bg-slate-600');
  $('stxt').textContent=r?'ON':'OFF';
  $('badge').className='flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-bold border '+(r?'border-emerald-400/30 text-emerald-400':'border-slate-700/50 text-slate-500');
  $('timer').className='font-mono text-xs '+(r?'text-emerald-400':'text-slate-600');
}

eel.expose(onDebug);
function onDebug(active,n){
  let h='';
  for(let i=0;i<n;i++){
    let bg,border,txt,label;
    if(active>=0&&i<active){bg='bg-emerald-500/15';border='border-emerald-500/30';txt='text-emerald-400';label='✓'}
    else if(i===active){bg='bg-cyan-500/15 animate-pulse';border='border-cyan-400/40';txt='text-cyan-300';label='●'}
    else{bg='bg-white/5';border='border-white/10';txt='text-slate-600';label=i+1}
    h+=`<div class="flex-1 h-5 rounded ${bg} border ${border} flex items-center justify-center"><span class="text-[8px] font-bold ${txt}">${label}</span></div>`;
  }
  if(!$('dbg'))return;
  $('dbg').innerHTML=h;
}

eel.expose(onLearned);
function onLearned(keys){
  if(!$('lkeys'))return;
  $('lkeys').innerHTML=keys.map(k=>`<span class="pop inline-flex items-center justify-center w-6 h-6 rounded-md bg-violet-500/15 border border-violet-500/25 text-violet-300 font-mono text-[10px] font-bold">${k.toUpperCase()}</span>`).join('');
  $('lbar').classList.remove('hidden');
}

async function go(){await eel.toggle(+$('sN').value,+$('sS').value,+$('sK').value,+$('sL').value)()}
async function doTest(){await eel.test(+$('sN').value)()}
async function clearL(){await eel.clear_learned()()}
function U(e,id,u=''){$(id).textContent=e.value+u}

document.addEventListener('keydown',e=>{
  if(e.key==='F5'){e.preventDefault();go()}
  if(e.key==='F6'){e.preventDefault();eel.select_region()}
  if(e.key==='Escape'&&on)eel.toggle(0,0,0,0);
});
</script>
</body>
</html>
