<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QTE Lane Test - Minigame Simulator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0a0e17; color: #eaf0f6;
    font-family: 'Rajdhani', sans-serif;
    height: 100vh; overflow: hidden; user-select: none;
  }
  .bg-grid {
    position:fixed; inset:0; z-index:0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 50px 50px;
  }
  .container {
    position:relative; z-index:1;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    height:100vh; padding:20px;
  }
  .header { text-align:center; margin-bottom:24px; }
  .header h1 {
    font-family:'Orbitron',sans-serif; font-size:1.8rem; font-weight:900;
    background:linear-gradient(135deg,#00d4ff,#a855f7,#ff6bcb);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:3px;
  }
  .header p { color:#5a6a7e; font-size:0.9rem; margin-top:2px; }
  .stats-bar {
    display:flex; gap:20px; margin-bottom:20px; padding:10px 28px;
    background:rgba(17,26,43,0.8); border:1px solid #1e3050; border-radius:14px;
  }
  .stat { text-align:center; }
  .stat .v { font-family:'Orbitron',sans-serif; font-size:1.3rem; font-weight:700; line-height:1; }
  .stat .v.blue { color:#00d4ff; } .stat .v.green { color:#22ff88; }
  .stat .v.red { color:#ff4466; } .stat .v.purple { color:#a855f7; }
  .stat .v.orange { color:#ff9f43; }
  .stat .l { font-size:0.6rem; color:#5a6a7e; text-transform:uppercase; letter-spacing:2px; margin-top:2px; }
  .lane-wrapper { width:100%; max-width:900px; margin-bottom:20px; }
  .lane-label { font-size:0.7rem; color:#5a6a7e; text-transform:uppercase; letter-spacing:3px; margin-bottom:6px; padding-left:4px; }
  .lane-box {
    position:relative; width:100%; height:90px;
    background:rgba(17,26,43,0.9); border:2px solid #1e3050;
    border-radius:16px; overflow:hidden; display:flex; align-items:center; padding:0 12px;
  }
  .lane-box.flash-green { border-color:#22ff88; box-shadow:0 0 30px rgba(34,255,136,0.15); }
  .lane-box.flash-red { border-color:#ff4466; box-shadow:0 0 30px rgba(255,68,102,0.15); }
  .lane-pointer {
    position:absolute; left:0; top:0; bottom:0; width:80px;
    background:linear-gradient(90deg, rgba(0,212,255,0.12), transparent);
    border-right:2px solid rgba(0,212,255,0.3); pointer-events:none; z-index:2;
  }
  .lane-pointer::after {
    content:'▶'; position:absolute; right:-12px; top:50%; transform:translateY(-50%);
    color:#00d4ff; font-size:1rem; filter:drop-shadow(0 0 6px rgba(0,212,255,0.5));
  }
  .lane-keys {
    display:flex; gap:10px; padding-left:20px;
    transition:transform 0.15s cubic-bezier(0.25,0.46,0.45,0.94); z-index:1;
  }
  .k {
    flex-shrink:0; width:62px; height:62px;
    display:flex; align-items:center; justify-content:center;
    font-family:'Orbitron',sans-serif; font-size:1.7rem; font-weight:900;
    border-radius:12px; border:2px solid #1e3050; background:rgba(22,32,50,0.8);
    color:#5a6a7e; position:relative; transition:all 0.15s ease;
  }
  .k.active {
    border-color:#00d4ff; color:#00d4ff; background:rgba(0,212,255,0.08);
    box-shadow:0 0 20px rgba(0,212,255,0.2), inset 0 0 20px rgba(0,212,255,0.05);
    transform:scale(1.08);
  }
  .k.active::before {
    content:''; position:absolute; inset:-4px; border-radius:14px;
    border:1px solid rgba(0,212,255,0.3); animation:activePulse 1s ease infinite;
  }
  .k.hit { border-color:#22ff88; color:#22ff88; background:rgba(34,255,136,0.1); box-shadow:0 0 15px rgba(34,255,136,0.15); }
  .k.hit::after { content:'✓'; position:absolute; top:-2px; right:2px; font-size:0.6rem; color:#22ff88; }
  .k.miss { border-color:#ff4466; color:#ff4466; background:rgba(255,68,102,0.08); text-decoration:line-through; opacity:0.7; }
  .k.upcoming { opacity:0.5; } .k.far { opacity:0.25; }
  @keyframes activePulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.4;transform:scale(1.05);} }
  .progress-wrap { width:100%; max-width:900px; margin-bottom:20px; }
  .progress-bar { height:6px; background:#162032; border-radius:3px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,#00d4ff,#a855f7); border-radius:3px; transition:width 0.15s ease; width:0%; }
  .progress-info { display:flex; justify-content:space-between; margin-top:4px; }
  .progress-info span { font-size:0.7rem; color:#5a6a7e; font-family:'Orbitron',sans-serif; letter-spacing:1px; }
  .feedback {
    font-family:'Orbitron',sans-serif; font-size:1.5rem; font-weight:700;
    height:40px; line-height:40px; text-align:center;
    opacity:0; transform:translateY(8px) scale(0.9); transition:all 0.15s ease;
  }
  .feedback.show { opacity:1; transform:translateY(0) scale(1); }
  .feedback.perfect { color:#22ff88; text-shadow:0 0 20px rgba(34,255,136,0.4); }
  .feedback.great { color:#00d4ff; } .feedback.good { color:#ffe066; }
  .feedback.miss { color:#ff4466; text-shadow:0 0 20px rgba(255,68,102,0.4); }
  .combo { position:fixed; top:20px; right:24px; text-align:right; }
  .combo .n { font-family:'Orbitron',sans-serif; font-size:2.5rem; font-weight:900; color:#ff9f43; line-height:1; text-shadow:0 0 30px rgba(255,159,67,0.3); transition:transform 0.1s ease; }
  .combo .n.pop { transform:scale(1.3); }
  .combo .cl { font-size:0.6rem; color:#5a6a7e; text-transform:uppercase; letter-spacing:3px; }
  .controls { display:flex; gap:10px; margin-top:12px; }
  .btn {
    font-family:'Rajdhani',sans-serif; font-size:0.95rem; font-weight:700;
    padding:10px 28px; border:2px solid #1e3050; border-radius:12px;
    background:rgba(17,26,43,0.8); color:#eaf0f6; cursor:pointer; letter-spacing:1px; transition:all 0.2s ease;
  }
  .btn:hover { border-color:#00d4ff; transform:translateY(-2px); box-shadow:0 0 15px rgba(0,212,255,0.15); }
  .btn.primary { background:linear-gradient(135deg,#00d4ff,#0099cc); border-color:#00d4ff; color:#0a0e17; }
  .btn.danger { border-color:#ff4466; color:#ff4466; }
  .btn.danger:hover { background:rgba(255,68,102,0.1); }
  .settings {
    margin-top:16px; padding:14px 24px; background:rgba(17,26,43,0.8);
    border:1px solid #1e3050; border-radius:14px;
    display:flex; gap:24px; flex-wrap:wrap; justify-content:center; align-items:center;
  }
  .set { display:flex; flex-direction:column; align-items:center; gap:4px; }
  .set label { font-size:0.6rem; color:#5a6a7e; text-transform:uppercase; letter-spacing:2px; }
  .set select, .set input {
    background:#0a0e17; color:#00d4ff; border:1px solid #1e3050; border-radius:8px;
    padding:5px 8px; font-family:'Rajdhani',sans-serif; font-size:0.9rem; font-weight:600; outline:none;
  }
  .set input[type=range] { -webkit-appearance:none; width:110px; height:5px; border-radius:3px; background:#1e3050; cursor:pointer; }
  .set input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:#00d4ff; cursor:pointer; box-shadow:0 0 8px rgba(0,212,255,0.4); }
  .rv { font-family:'Orbitron',sans-serif; font-size:0.8rem; color:#00d4ff; font-weight:700; }
  .rounds { margin-top:16px; display:flex; gap:4px; flex-wrap:wrap; justify-content:center; max-width:900px; }
  .rounds .dot { width:10px; height:10px; border-radius:50%; background:#1e3050; animation:dotIn 0.15s ease; }
  .rounds .dot.g { background:#22ff88; box-shadow:0 0 4px rgba(34,255,136,0.3); }
  .rounds .dot.r { background:#ff4466; box-shadow:0 0 4px rgba(255,68,102,0.3); }
  @keyframes dotIn { 0%{transform:scale(0);} 100%{transform:scale(1);} }
  .timer-bar-wrap { width:100%; max-width:900px; height:4px; margin-bottom:10px; background:#162032; border-radius:2px; overflow:hidden; }
  .timer-bar-fill { height:100%; width:100%; background:linear-gradient(90deg,#22ff88,#00d4ff); border-radius:2px; transition:width linear; }
  .timer-bar-fill.warn { background:linear-gradient(90deg,#ff9f43,#ff4466); }
  .particle { position:fixed; width:4px; height:4px; border-radius:50%; pointer-events:none; z-index:10; }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="combo"><div class="n" id="comboN">0</div><div class="cl">Combo</div></div>
<div class="container">
  <div class="header">
    <h1>QTE LANE TEST</h1>
    <p>Minigame Simulator - ทดสอบ Macro กดตามตัวอักษรต่อเนื่อง</p>
  </div>
  <div class="stats-bar">
    <div class="stat"><div class="v green" id="sScore">0</div><div class="l">Score</div></div>
    <div class="stat"><div class="v blue" id="sHit">0</div><div class="l">Hit</div></div>
    <div class="stat"><div class="v red" id="sMiss">0</div><div class="l">Miss</div></div>
    <div class="stat"><div class="v purple" id="sAcc">0%</div><div class="l">Accuracy</div></div>
    <div class="stat"><div class="v orange" id="sAvg">0ms</div><div class="l">Avg React</div></div>
    <div class="stat"><div class="v blue" id="sRound">0</div><div class="l">Round</div></div>
  </div>
  <div class="lane-wrapper">
    <div class="lane-label">PRESS KEYS IN ORDER ▶</div>
    <div class="lane-box" id="laneBox">
      <div class="lane-pointer"></div>
      <div class="lane-keys" id="laneKeys"></div>
    </div>
  </div>
  <div class="timer-bar-wrap"><div class="timer-bar-fill" id="timerBar"></div></div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
    <div class="progress-info"><span id="progText">0 / 0</span><span id="progPct">0%</span></div>
  </div>
  <div class="feedback" id="fb">PERFECT</div>
  <div class="controls">
    <button class="btn primary" id="btnStart" onclick="startGame()">START GAME</button>
    <button class="btn danger" id="btnStop" onclick="stopGame()" style="display:none">STOP</button>
    <button class="btn" onclick="resetAll()">RESET</button>
  </div>
  <div class="settings">
    <div class="set"><label>Keys Per Round</label><input type="range" id="setLen" min="3" max="20" value="8" oninput="$('lenV').textContent=this.value"><span class="rv" id="lenV">8</span></div>
    <div class="set"><label>Time per Key</label><input type="range" id="setTime" min="300" max="5000" value="2000" step="100" oninput="$('timeV').textContent=this.value+'ms'"><span class="rv" id="timeV">2000ms</span></div>
    <div class="set"><label>Auto Next</label><input type="range" id="setDelay" min="200" max="3000" value="1000" step="100" oninput="$('delayV').textContent=this.value+'ms'"><span class="rv" id="delayV">1000ms</span></div>
    <div class="set"><label>Key Set</label><select id="setKeys"><option value="qweasd">Q W E A S D</option><option value="qweasdzxc">+ Z X C</option><option value="qwertyuiop">All Q Row</option><option value="1234567890">Numbers</option><option value="qweasd123">Mix</option></select></div>
    <div class="set"><label>Mode</label><select id="setMode"><option value="normal">Normal</option><option value="endless">Endless</option><option value="speedup">Speed Up</option></select></div>
    <div class="set"><label>Font Size</label><select id="setFont" onchange="applyFont()"><option value="1.7">Large</option><option value="1.3">Medium</option><option value="1.0">Small</option><option value="0.8">Tiny</option></select></div>
  </div>
  <div class="rounds" id="rounds"></div>
</div>
<script>
const $=id=>document.getElementById(id);
let playing=false,sequence=[],currentIdx=0,keyShownAt=0,roundNum=0,combo=0,maxCombo=0,timerAnim=null,roundTimeout=null,speedMultiplier=1;
let stats={score:0,hit:0,miss:0,reactions:[]};
function getKeys(){return $('setKeys').value.split('')}
function getLen(){return parseInt($('setLen').value)}
function getTimePerKey(){return parseInt($('setTime').value)*(1/speedMultiplier)}
function getDelay(){return parseInt($('setDelay').value)}
function getMode(){return $('setMode').value}
function randKey(){const k=getKeys();return k[Math.floor(Math.random()*k.length)]}
function applyFont(){document.querySelectorAll('.k').forEach(el=>{el.style.fontSize=$('setFont').value+'rem'})}
function particles(el,color,n=10){const rect=el.getBoundingClientRect();const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;for(let i=0;i<n;i++){const p=document.createElement('div');p.className='particle';p.style.left=cx+'px';p.style.top=cy+'px';p.style.background=color;p.style.boxShadow=`0 0 6px ${color}`;document.body.appendChild(p);const a=(Math.PI*2/n)*i+Math.random()*0.5,sp=60+Math.random()*100,dx=Math.cos(a)*sp,dy=Math.sin(a)*sp;p.animate([{transform:'translate(0,0) scale(1)',opacity:1},{transform:`translate(${dx}px,${dy}px) scale(0)`,opacity:0}],{duration:500+Math.random()*300,easing:'cubic-bezier(0,0,0.2,1)'}).onfinish=()=>p.remove()}}
function renderLane(){const c=$('laneKeys');c.innerHTML='';sequence.forEach((key,i)=>{const d=document.createElement('div');d.className='k';d.id='key_'+i;d.textContent=key.toUpperCase();d.style.fontSize=$('setFont').value+'rem';if(i===currentIdx)d.classList.add('active');else if(i<=currentIdx+3)d.classList.add('upcoming');else if(i>currentIdx)d.classList.add('far');c.appendChild(d)});scrollToActive();updateProgress()}
function scrollToActive(){$('laneKeys').style.transform=`translateX(${-currentIdx*(62+10)+20}px)`}
function updateKeyStates(){sequence.forEach((_,i)=>{const el=$('key_'+i);if(!el)return;el.classList.remove('active','upcoming','far','hit','miss');if(i<currentIdx){}else if(i===currentIdx)el.classList.add('active');else if(i<=currentIdx+3)el.classList.add('upcoming');else el.classList.add('far')});scrollToActive()}
function updateProgress(){const t=sequence.length,d=currentIdx,p=t>0?Math.round(d/t*100):0;$('progFill').style.width=p+'%';$('progText').textContent=`${d} / ${t}`;$('progPct').textContent=p+'%'}
function startKeyTimer(){const bar=$('timerBar'),time=getTimePerKey();bar.style.transition='none';bar.style.width='100%';bar.classList.remove('warn');void bar.offsetWidth;bar.style.transition=`width ${time}ms linear`;bar.style.width='0%';clearTimeout(timerAnim);timerAnim=setTimeout(()=>{bar.classList.add('warn')},time*0.6);clearTimeout(roundTimeout);roundTimeout=setTimeout(()=>{if(!playing||currentIdx>=sequence.length)return;onMissKey()},time);keyShownAt=performance.now()}
function startGame(){playing=true;speedMultiplier=1;$('btnStart').style.display='none';$('btnStop').style.display='';nextRound()}
function stopGame(){playing=false;clearTimeout(roundTimeout);clearTimeout(timerAnim);$('btnStart').style.display='';$('btnStop').style.display='none';$('timerBar').style.transition='none';$('timerBar').style.width='100%';$('timerBar').classList.remove('warn')}
function nextRound(){if(!playing)return;roundNum++;$('sRound').textContent=roundNum;sequence=Array.from({length:getLen()},()=>randKey());currentIdx=0;if(getMode()==='speedup')speedMultiplier=1+(roundNum-1)*0.15;renderLane();startKeyTimer()}
function onHitKey(r){const el=$('key_'+currentIdx);if(el){el.classList.remove('active');el.classList.add('hit');particles(el,'#22ff88',8)}stats.hit++;stats.reactions.push(r);let pts=0,lbl='',cls='';if(r<100){pts=100;lbl='PERFECT';cls='perfect'}else if(r<250){pts=75;lbl='GREAT';cls='great'}else if(r<500){pts=50;lbl='GOOD';cls='good'}else{pts=25;lbl='OK';cls='good'}combo++;if(combo>maxCombo)maxCombo=combo;pts+=combo*3;stats.score+=pts;showFeedback(`${lbl} +${pts} ${r}ms`,cls);updateStats();updateCombo();flashLane('green');currentIdx++;clearTimeout(roundTimeout);clearTimeout(timerAnim);if(currentIdx>=sequence.length){addRoundDot(true);updateProgress();showFeedback(`ROUND ${roundNum} CLEAR! +${combo*10} bonus`,'perfect');stats.score+=combo*10;updateStats();setTimeout(()=>{if(playing){if(getMode()==='endless'){sequence.push(...Array.from({length:getLen()},()=>randKey()));renderLane();startKeyTimer()}else nextRound()}},getDelay())}else{updateKeyStates();updateProgress();startKeyTimer()}}
function onMissKey(){const el=$('key_'+currentIdx);if(el){el.classList.remove('active');el.classList.add('miss')}stats.miss++;combo=0;showFeedback('MISS','miss');updateStats();updateCombo();flashLane('red');currentIdx++;clearTimeout(roundTimeout);clearTimeout(timerAnim);if(currentIdx>=sequence.length){addRoundDot(false);updateProgress();setTimeout(()=>{if(playing)nextRound()},getDelay())}else{updateKeyStates();updateProgress();startKeyTimer()}}
document.addEventListener('keydown',(e)=>{if(!playing||currentIdx>=sequence.length)return;const p=e.key.toLowerCase(),ex=sequence[currentIdx];if(p===ex){onHitKey(Math.round(performance.now()-keyShownAt))}else{onMissKey()}});
function showFeedback(t,c){const f=$('fb');f.textContent=t;f.className='feedback '+c;void f.offsetWidth;f.classList.add('show');setTimeout(()=>f.classList.remove('show'),1000)}
function updateStats(){$('sScore').textContent=stats.score;$('sHit').textContent=stats.hit;$('sMiss').textContent=stats.miss;const t=stats.hit+stats.miss;$('sAcc').textContent=t>0?Math.round(stats.hit/t*100)+'%':'0%';const a=stats.reactions.length>0?Math.round(stats.reactions.reduce((a,b)=>a+b,0)/stats.reactions.length):0;$('sAvg').textContent=a+'ms'}
function updateCombo(){const e=$('comboN');e.textContent=combo;e.classList.add('pop');setTimeout(()=>e.classList.remove('pop'),100)}
function flashLane(c){const b=$('laneBox');b.classList.add('flash-'+c);setTimeout(()=>b.classList.remove('flash-'+c),200)}
function addRoundDot(s){const d=document.createElement('div');d.className='dot '+(s?'g':'r');$('rounds').appendChild(d)}
function resetAll(){stopGame();stats={score:0,hit:0,miss:0,reactions:[]};combo=0;maxCombo=0;roundNum=0;speedMultiplier=1;updateStats();updateCombo();$('sRound').textContent='0';$('rounds').innerHTML='';$('laneKeys').innerHTML='';$('progFill').style.width='0%';$('progText').textContent='0 / 0';$('progPct').textContent='0%'}
</script>
</body>
</html>
